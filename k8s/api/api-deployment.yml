spec:
  replicas: 1

  selector:
    matchLabels:
      app: api

  template:
    metadata:
      labels:
        app: api

    spec:
      containers:
        - name: api
          image: sameusers/api:9147522eabb8688af89a13dd66e4d8daa5a9ad33

          envFrom:
            - configMapRef:
                name: api-config